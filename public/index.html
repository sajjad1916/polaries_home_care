<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polaris Home Care - Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#072d5a;--accent:#ff8a02;--success:#2D6A4F;--danger:#D62828;
  --warning:#F77F00;--bg:#F8F9FA;--card:#FFFFFF;--text:#212529;
  --border:#DEE2E6;--muted:#6C757D;--shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-lg:0 4px 12px rgba(0,0,0,.12);--radius:8px;
}
html{font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
body{min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:.875rem}

.navbar{background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 24px;height:56px;position:fixed;top:0;left:0;right:0;z-index:100}
.navbar .brand{font-size:1.1rem;font-weight:700;letter-spacing:-.3px;margin-right:32px;white-space:nowrap}
.navbar .nav-links{display:flex;gap:4px}
.navbar .nav-links a{color:rgba(255,255,255,.7);padding:6px 14px;border-radius:6px;font-size:.875rem;font-weight:500;transition:all .15s}
.navbar .nav-links a:hover,.navbar .nav-links a.active{color:#fff;background:rgba(255,255,255,.12);text-decoration:none}
.navbar .spacer{flex:1}
.navbar .user-info{display:flex;align-items:center;gap:12px;font-size:.8rem;color:rgba(255,255,255,.8)}
.navbar .user-info span{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:4px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;font-size:.8rem;font-weight:600;transition:all .15s;text-decoration:none}
.btn:hover{text-decoration:none;filter:brightness(1.08)}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-logout{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-logout:hover{background:rgba(255,255,255,.2)}

.main{padding:80px 24px 40px;max-width:1280px;margin:0 auto}
.page-title{font-size:1.5rem;font-weight:700;margin-bottom:20px;color:var(--primary)}

.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);text-align:center}
.stat-card .stat-value{font-size:1.75rem;font-weight:700;line-height:1.2}
.stat-card .stat-label{font-size:.72rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-card.highlight-danger .stat-value{color:var(--danger)}
.stat-card.highlight-warning .stat-value{color:var(--warning)}
.stat-card.highlight-success .stat-value{color:var(--success)}

.actions-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}

.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:6px;font-size:.875rem;outline:none;transition:border .15s}
.search-bar input:focus{border-color:var(--accent)}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.filter-pill{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:.75rem;font-weight:500;background:#fff;color:var(--muted);cursor:pointer;transition:all .15s}
.filter-pill:hover{border-color:var(--accent);color:var(--accent)}
.filter-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px}
.pagination-info{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.pagination-info select{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.8rem;background:#fff;cursor:pointer}
.pagination-controls{display:flex;align-items:center;gap:4px}
.pagination-pages{display:flex;gap:2px}
@media(max-width:600px){.pagination-pages{display:none}}

table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{padding:10px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid var(--border)}
th:hover{color:var(--primary)}
th .sort-icon{margin-left:4px;opacity:.4;font-size:.65rem}
th.sorted .sort-icon{opacity:1;color:var(--primary)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.85rem;white-space:nowrap}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:rgba(98,182,203,.06)}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;text-transform:capitalize}
.badge-applicant{background:rgba(98,182,203,.15);color:#1B4965}
.badge-active{background:rgba(45,106,79,.12);color:var(--success)}
.badge-complete{background:rgba(45,106,79,.12);color:var(--success)}
.badge-incomplete{background:rgba(214,40,40,.1);color:var(--danger)}
.badge-valid{background:rgba(45,106,79,.12);color:var(--success)}
.badge-expired{background:rgba(214,40,40,.1);color:var(--danger)}
.badge-missing{background:rgba(108,117,125,.12);color:var(--muted)}

.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.detail-header .back-btn{color:var(--muted);font-size:.8rem;display:flex;align-items:center;gap:4px}
.detail-header .back-btn:hover{color:var(--primary)}
.detail-header h1{font-size:1.35rem;font-weight:700;color:var(--primary)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}}

.section{margin-bottom:24px}
.section-title{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--primary);display:flex;align-items:center;gap:8px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px}
@media(max-width:600px){.info-grid{grid-template-columns:1fr}}
.edit-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
@media(max-width:600px){.edit-form-grid{grid-template-columns:1fr}}
.edit-form-grid .field{display:flex;flex-direction:column;gap:4px}
.edit-form-grid .field label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
.edit-form-grid .field input,.edit-form-grid .field select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;transition:border-color .15s}
.edit-form-grid .field input:focus,.edit-form-grid .field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(98,182,203,.15)}
.section .field label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:4px;display:block}
.section .field textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;font-family:inherit;resize:vertical;transition:border-color .15s}
.section .field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(98,182,203,.15)}
.detail-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.info-item{padding:6px 0}
.info-item .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:2px}
.info-item .value{font-size:.875rem;color:var(--text)}

.doc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.doc-card{border:1px solid var(--border);border-radius:var(--radius);padding:16px;background:var(--card)}
.doc-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.doc-card-header h4{font-size:.85rem;font-weight:600}
.doc-card .doc-dates{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.doc-card .doc-dates .mismatch-warn{color:var(--warning);font-weight:600;margin-left:4px}
.doc-card .doc-actions{display:flex;gap:6px;flex-wrap:wrap}

.admin-actions{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px}
.admin-actions .field{display:flex;flex-direction:column;gap:4px}
.admin-actions .field label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
.admin-actions .field select,.admin-actions .field input{padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem}

.notes-section textarea{width:100%;min-height:100px;padding:10px 14px;border:1px solid var(--border);border-radius:6px;resize:vertical;font-size:.85rem}
.notes-section .save-row{margin-top:8px;text-align:right}

.login-wrapper{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:40px;width:100%;max-width:380px}
.login-card .brand{text-align:center;margin-bottom:28px}
.login-card .brand h1{font-size:1.3rem;font-weight:700;color:var(--primary)}
.login-card .brand p{font-size:.8rem;color:var(--muted);margin-top:4px}
.login-card .field{margin-bottom:16px}
.login-card .field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.login-card .field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;outline:none;transition:border .15s}
.login-card .field input:focus{border-color:var(--accent)}
.login-card .error-msg{background:rgba(214,40,40,.08);color:var(--danger);font-size:.8rem;padding:8px 12px;border-radius:6px;margin-bottom:12px;display:none}
.login-card .btn{width:100%;justify-content:center;padding:11px;font-size:.9rem}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:12px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1rem;font-weight:700;color:var(--primary)}
.modal-close{background:none;border:none;font-size:1.3rem;color:var(--muted);padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-body .field{margin-bottom:16px}
.modal-body .field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.modal-body .field input,.modal-body .field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem}
.drop-zone{border:2px dashed var(--border);border-radius:8px;padding:30px;text-align:center;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .15s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(98,182,203,.04)}
.drop-zone .file-name{color:var(--success);font-weight:600;margin-top:8px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--border)}

.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.spinner-lg{width:36px;height:36px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted);font-size:.85rem}

.toast-container{position:fixed;top:68px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:.82rem;font-weight:500;color:#fff;box-shadow:var(--shadow-lg);transform:translateX(120%);transition:transform .3s ease;max-width:360px}
.toast.show{transform:translateX(0)}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
.toast-warning{background:var(--warning)}
.toast-info{background:var(--primary)}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:.9rem}

/* Activity Feed */
.activity-feed{margin-bottom:24px}
.activity-list{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:.82rem}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.activity-icon.act-update{background:rgba(98,182,203,.15)}
.activity-icon.act-upload{background:rgba(45,106,79,.12)}
.activity-icon.act-create{background:rgba(98,182,203,.15)}
.activity-icon.act-delete{background:rgba(214,40,40,.1)}
.activity-icon.act-resolve{background:rgba(247,127,0,.12)}
.activity-icon.act-default{background:rgba(108,117,125,.12)}
.activity-text{flex:1;line-height:1.4}
.activity-text strong{font-weight:600}
.activity-time{font-size:.72rem;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px}

/* Expiring Soon */
.expiring-section{margin-bottom:24px}
.expiring-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.expiring-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s;display:flex;align-items:center;gap:14px}
.expiring-card:hover{box-shadow:var(--shadow-lg)}
.expiring-card.urgency-30{border-left:4px solid var(--danger)}
.expiring-card.urgency-60{border-left:4px solid var(--warning)}
.expiring-card.urgency-90{border-left:4px solid #E9C46A}
.expiring-days{font-size:1.3rem;font-weight:700;width:50px;text-align:center;flex-shrink:0}
.expiring-days.days-30{color:var(--danger)}
.expiring-days.days-60{color:var(--warning)}
.expiring-days.days-90{color:#C9960C}
.expiring-info{flex:1;min-width:0}
.expiring-info .name{font-weight:600;font-size:.85rem;margin-bottom:2px}
.expiring-info .doc-type{font-size:.75rem;color:var(--muted)}
.expiring-info .exp-date{font-size:.75rem;color:var(--muted)}

/* Document Preview Modal */
.modal-preview{max-width:800px}
.preview-container{text-align:center;padding:10px 0}
.preview-container img{max-width:100%;max-height:65vh;border-radius:6px;box-shadow:var(--shadow)}
.preview-container iframe{width:100%;height:65vh;border:none;border-radius:6px}

/* QR Code Modal */
.qr-modal-content{text-align:center;padding:10px 0}
.qr-modal-content canvas{margin:0 auto 16px;display:block}
.qr-url-display{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:.8rem;word-break:break-all;margin-bottom:12px;color:var(--text);font-family:monospace}

/* Table scroll wrapper for mobile */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* Settings page */
.settings-table{width:100%;border-collapse:collapse}
.settings-table th{padding:10px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;border-bottom:2px solid var(--border);background:var(--bg)}
.settings-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.85rem}
.badge-admin{background:rgba(27,73,101,.12);color:var(--primary)}
.badge-staff{background:rgba(108,117,125,.12);color:var(--muted)}

@media(max-width:768px){
  .main{padding:70px 14px 30px}
  .navbar{padding:0 14px}
  .navbar .brand{font-size:.95rem;margin-right:16px}
  .stats-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
  .doc-cards{grid-template-columns:1fr}
  .expiring-cards{grid-template-columns:1fr}
}
@media(max-width:480px){
  .navbar .nav-links a{padding:6px 8px;font-size:.78rem}
  .navbar .user-info .user-name{display:none}
  .detail-header{flex-direction:column;align-items:flex-start}
  .detail-header-right{margin-left:0!important;width:100%;display:flex;justify-content:space-between;align-items:center}
  .modal{max-width:calc(100vw - 32px)}
  .modal-preview{max-width:calc(100vw - 32px)}
}
</style>
</head>
<body>

<div id="app"></div>
<div class="toast-container" id="toast-container"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
(function(){
"use strict";

const API = '';
let currentUser = null;
let currentRoute = '';

function $(sel, ctx){ return (ctx||document).querySelector(sel); }
function $$(sel, ctx){ return Array.from((ctx||document).querySelectorAll(sel)); }

function formatNumber(n){
  if(n == null) return '0';
  return Number(n).toLocaleString();
}

function formatDate(d){
  if(!d) return '--';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function docTypeLabel(t){
  const map = {
    drivers_license:"Driver's License",
    tb_test:'TB Test (Skin Test / X-Ray)',
    background_check:'Background Check Registration',
    car_insurance:'Car Insurance',
    social_security:'Social Security Card'
  };
  return map[t] || t.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

async function api(path, opts={}){
  const url = API + path;
  const res = await fetch(url,{
    credentials:'include',
    headers: opts.body && !(opts.body instanceof FormData) ? {'Content-Type':'application/json',...(opts.headers||{})} : (opts.headers||{}),
    ...opts,
    body: opts.body instanceof FormData ? opts.body : (opts.body ? JSON.stringify(opts.body) : undefined)
  });
  if(res.status === 401){
    currentUser = null;
    navigate('login');
    throw new Error('Unauthorized');
  }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || data.message || `Request failed (${res.status})`);
  return data;
}

function toast(msg, type='info'){
  const c = $('#toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=>el.remove(),300);
  },3500);
}

function openModal(html){
  $('#modal-content').innerHTML = html;
  $('#modal-overlay').classList.add('open');
}

function closeModal(){
  $('#modal-overlay').classList.remove('open');
}

$('#modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

function navigate(route){
  if(route.startsWith('#')) route = route.slice(1);
  if(route.startsWith('/')) route = route.slice(1);
  window.location.hash = '#/' + route;
}

function getRoute(){
  let h = window.location.hash.replace(/^#\/?/,'');
  return h || 'dashboard';
}

async function checkAuth(){
  try{
    const data = await api('/api/auth/me');
    currentUser = data.user || data;
    return true;
  }catch(e){
    currentUser = null;
    return false;
  }
}

function renderApp(){
  const app = $('#app');
  const route = getRoute();
  currentRoute = route;

  if(route === 'login' || !currentUser){
    app.innerHTML = renderLoginPage();
    bindLogin();
    return;
  }

  let content = '';
  if(route === 'dashboard'){
    content = `<div class="loading-center"><div class="spinner spinner-lg"></div><span>Loading dashboard...</span></div>`;
  } else if(route === 'caregivers'){
    content = `<div class="loading-center"><div class="spinner spinner-lg"></div><span>Loading caregivers...</span></div>`;
  } else if(route.match(/^caregivers\/\d+$/)){
    content = `<div class="loading-center"><div class="spinner spinner-lg"></div><span>Loading caregiver...</span></div>`;
  } else if(route === 'settings'){
    content = `<div class="loading-center"><div class="spinner spinner-lg"></div><span>Loading settings...</span></div>`;
  } else {
    content = `<div class="empty-state"><div class="icon">&#128269;</div><p>Page not found</p></div>`;
  }

  app.innerHTML = renderNavbar() + `<div class="main" id="main-content">${content}</div>`;
  bindNavbar();

  if(route === 'dashboard') loadDashboard();
  else if(route === 'caregivers') loadCaregiverList();

    loadCaregiverDetail(id);
  }
}

function formatRelativeTime(dateStr){
  if(!dateStr) return '';
  const now = new Date();
  const dt = new Date(dateStr);
  const diff = Math.floor((now - dt) / 1000);
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if(diff < 172800) return 'Yesterday';
  if(diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return formatDate(dateStr);
}

function formatActivityAction(entry){
  let icon = '&#128221;', cls = 'act-default', text = entry.action;
  const details = entry.details ? JSON.parse(entry.details) : {};
  const name = details.name || details.first_name ? [details.first_name, details.last_name].filter(Boolean).join(' ') : '';
  switch(entry.action){
    case 'update_caregiver':
      icon = '&#9998;'; cls = 'act-update';
      text = name ? `Updated profile for <strong>${name}</strong>` : 'Updated caregiver profile';
      break;
    case 'upload_document':
      icon = '&#8593;'; cls = 'act-upload';
      text = `Uploaded ${details.document_type ? docTypeLabel(details.document_type) : 'document'}${name ? ' for <strong>'+name+'</strong>' : ''}`;
      break;
    case 'create_caregiver':
      icon = '&#43;'; cls = 'act-create';
      text = name ? `New caregiver onboarded: <strong>${name}</strong>` : 'New caregiver onboarded';
      break;
    case 'delete_caregiver':
      icon = '&#128465;'; cls = 'act-delete';
      text = name ? `Deleted caregiver <strong>${name}</strong>` : 'Deleted caregiver';
      break;
    case 'resolve_mismatch':
      icon = '&#10003;'; cls = 'act-resolve';
      text = 'Resolved date mismatch';
      break;
    case 'create_admin_user':
      icon = '&#128100;'; cls = 'act-create';
      text = details.username ? `Created admin user <strong>${details.username}</strong>` : 'Created admin user';
      break;
    case 'status_change':
      icon = '&#8594;'; cls = 'act-update';
      text = name ? `Changed status for <strong>${name}</strong>` : 'Changed caregiver status';
      if(details.new_status) text += ` to ${details.new_status}`;
      break;
    case 'compliance_reminder':
      icon = '&#128276;'; cls = 'act-resolve';
      text = name ? `Compliance reminder for <strong>${name}</strong>` : 'Compliance reminder sent';
      break;
  }
  return { icon, cls, text };
}

function computeDaysRemaining(dateStr){
  const exp = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.ceil((exp - now) / (1000*60*60*24));
}

// QR Code: use Google Charts API to generate a real, scannable QR code image
function drawQRCode(canvas, text){
  const size = 200;
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#999';
  ctx.font = '12px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Loading QR...', size/2, size/2);

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function(){
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
  };
  img.onerror = function(){
    // Fallback: show the URL as text if image fails
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#D62828';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('QR failed to load.', size/2, size/2 - 10);
    ctx.fillText('Copy the link below.', size/2, size/2 + 10);
  };
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(text);
}

function renderCaregiverTable(){
  const st = caregiverListState;
  const area = $('#cg-table-area');
  if(!area) return;
  if(st.data.length === 0){
    area.innerHTML = `<div class="empty-state"><div class="icon">&#128203;</div><p>No caregivers found.</p></div>`;
    return;
  }
  const arrow = (col)=> st.sort===col ? (st.order==='asc'?'&#9650;':'&#9660;') : '&#8597;';
  const sorted = (col)=> st.sort===col ? 'sorted' : '';

  // Pagination
  const total = st.data.length;
  const totalPages = Math.max(1, Math.ceil(total / st.pageSize));
  if(st.page > totalPages) st.page = totalPages;
  const start = (st.page - 1) * st.pageSize;
  const pageData = st.data.slice(start, start + st.pageSize);
  const showingFrom = total === 0 ? 0 : start + 1;
  const showingTo = Math.min(start + st.pageSize, total);

  area.innerHTML = `<div class="table-scroll"><table>
    <thead><tr>
      <th class="${sorted('id')}" data-col="id">ID <span class="sort-icon">${arrow('id')}</span></th>
      <th class="${sorted('name')}" data-col="name">Name <span class="sort-icon">${arrow('name')}</span></th>
      <th class="${sorted('status')}" data-col="status">Status <span class="sort-icon">${arrow('status')}</span></th>
      <th class="${sorted('compliance_status')}" data-col="compliance_status">Compliance <span class="sort-icon">${arrow('compliance_status')}</span></th>
      <th class="${sorted('nearest_expiration')}" data-col="nearest_expiration">Nearest Exp. <span class="sort-icon">${arrow('nearest_expiration')}</span></th>
      <th class="${sorted('created_at')}" data-col="created_at">Created <span class="sort-icon">${arrow('created_at')}</span></th>
      <th style="cursor:default">Actions</th>
    </tr></thead>
    <tbody>${pageData.map(c=>{
      const name = [c.first_name,c.last_name].filter(Boolean).join(' ') || '--';
      const statusCls = c.status === 'active' ? 'badge-active' : 'badge-applicant';
      const compCls = c.overall_compliance === 'complete' ? 'badge-complete' : 'badge-incomplete';
      return `<tr data-id="${c.caregiver_id}">
        <td>${c.caregiver_id}</td>
        <td>${name}</td>
        <td><span class="badge ${statusCls}">${c.status||'applicant'}</span></td>
        <td><span class="badge ${compCls}">${c.overall_compliance||'incomplete'}</span></td>
        <td>${formatDate(c.nearestExpiration)}</td>
        <td>${formatDate(c.created_at)}</td>
        <td><button class="btn btn-outline btn-sm btn-copy-link" data-cid="${c.caregiver_id}" title="Copy upload link">&#128279;</button></td>
      </tr>`;
    }).join('')}</tbody></table></div>
    <div class="pagination">
      <span class="pagination-info">Showing ${showingFrom}-${showingTo} of ${total} &nbsp;|&nbsp; <select id="pg-size">${[10,15,20,25].map(n=>`<option value="${n}" ${n===st.pageSize?'selected':''}>${n}</option>`).join('')}</select> per page</span>
      <div class="pagination-controls">
        <button class="btn btn-outline btn-sm" id="pg-first" ${st.page<=1?'disabled':''}>&#171;</button>
        <button class="btn btn-outline btn-sm" id="pg-prev" ${st.page<=1?'disabled':''}>&#8249; Prev</button>
        <span class="pagination-pages">${Array.from({length:totalPages},(_,i)=>i+1).map(p=>
          `<button class="btn btn-sm ${p===st.page?'btn-primary':'btn-outline'} pg-num" data-p="${p}">${p}</button>`
        ).join('')}</span>
        <button class="btn btn-outline btn-sm" id="pg-next" ${st.page>=totalPages?'disabled':''}>Next &#8250;</button>
        <button class="btn btn-outline btn-sm" id="pg-last" ${st.page>=totalPages?'disabled':''}>&#187;</button>
      </div>
    </div>`;

  // Pagination events
  const goPage = (p)=>{ st.page = p; renderCaregiverTable(); };
  if($('#pg-size')) $('#pg-size').addEventListener('change',(e)=>{ st.pageSize = parseInt(e.target.value); st.page = 1; renderCaregiverTable(); });
  if($('#pg-first')) $('#pg-first').addEventListener('click',()=>goPage(1));
  if($('#pg-prev')) $('#pg-prev').addEventListener('click',()=>goPage(st.page-1));
  if($('#pg-next')) $('#pg-next').addEventListener('click',()=>goPage(st.page+1));
  if($('#pg-last')) $('#pg-last').addEventListener('click',()=>goPage(totalPages));
  $$('.pg-num').forEach(btn=>btn.addEventListener('click',()=>goPage(parseInt(btn.dataset.p))));

  $$('#cg-table-area tbody tr').forEach(tr=>{
    tr.addEventListener('click',()=> navigate('caregivers/' + tr.dataset.id));
  });
  $$('.btn-copy-link').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const url = window.location.origin + '/upload/' + btn.dataset.cid;
      navigator.clipboard.writeText(url).then(()=>toast('Upload link copied!','success')).catch(()=>toast('Could not copy','error'));
    });
  });
  $$('#cg-table-area th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
      const col = th.dataset.col;
      if(st.sort === col) st.order = st.order==='asc'?'desc':'asc';
      else { st.sort = col; st.order = 'asc'; }
      st.page = 1;
      loadCaregiverList();
    });
  });
}

function bindCaregiverListEvents(){
  const searchInput = $('#cg-search');

          </div>

          <div class="section">
            <div class="section-title">&#128222; Emergency Contact</div>
            <div class="card" style="padding:16px">
              <div class="edit-form-grid">
                <div class="field"><label>Contact Name</label><input type="text" id="ed-emergency_contact_name" value="${esc(c.emergency_contact_name)}"></div>
                <div class="field"><label>Phone</label><input type="tel" id="ed-emergency_contact_phone" value="${esc(c.emergency_contact_phone)}"></div>
                <div class="field"><label>Relationship</label><input type="text" id="ed-emergency_contact_relationship" value="${esc(c.emergency_contact_relationship)}"></div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">&#9997; Electronic Signature</div>
            <div class="card" style="padding:16px">
              ${c.signature_data
                ? `<div style="background:#fafafa;border:1px solid var(--border);border-radius:6px;padding:16px;text-align:center">
                    <img src="${c.signature_data}" alt="Signature of ${name}" style="max-width:280px;height:auto">
                    <div style="font-size:.75rem;color:var(--muted);margin-top:8px">Signed on ${formatDate(c.signed_at)}</div>
                  </div>`
                : `<div style="color:var(--muted);font-size:.85rem;padding:12px;text-align:center">No signature on file</div>`
              }
            </div>
          </div>

          <div class="section">
            <div class="section-title">&#127891; Experience &amp; Qualifications</div>
            <div class="card" style="padding:16px">
              <div class="field" style="margin-bottom:12px"><label>Work Experience</label><textarea id="ed-prior_experience" rows="4">${esc(c.prior_experience)}</textarea></div>
              <div class="field" style="margin-bottom:12px"><label>Certifications</label><textarea id="ed-certifications" rows="4">${esc(c.certifications)}</textarea></div>
              <div class="field"><label>Availability</label><textarea id="ed-availability" rows="3">${esc(c.availability)}</textarea></div>
            </div>
          </div>
        </div>

        <div>
          <div class="section notes-section">
            <div class="section-title">&#128221; Notes</div>
            <div class="card" style="padding:16px">
              <textarea id="ed-notes" placeholder="Add notes about this caregiver..." rows="6">${esc(c.notes)}</textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">&#128196; Compliance Documents</div>
        <div class="doc-cards">${docTypes.map(type=>{
          const doc = docs[type] || null;
          return renderDocCard(caregiverId, type, doc);
        }).join('')}</div>
      </div>`;

    // Save all profile fields
    $('#btn-save-profile').addEventListener('click', async ()=>{
      const btn = $('#btn-save-profile');
      btn.disabled = true; btn.textContent = 'Saving...';
      try{
        const body = {};
        const fields = [
          'first_name','last_name','email','phone','date_of_birth',
          'address_street','address_city','address_state','address_zip',
          'emergency_contact_name','emergency_contact_phone','emergency_contact_relationship',
          'prior_experience','certifications','availability',
          'viventium_id','notes'
        ];
        fields.forEach(f => {
          const el = $('#ed-' + f);
          if(el) body[f] = el.value.trim() || null;
        });
        body.status = $('#ed-status').value;

        if(!body.first_name || !body.last_name){
          toast('First name and last name are required','error');
          btn.disabled = false; btn.textContent = 'Save All Changes';
          return;
        }

        await api('/api/caregivers/' + id, { method: 'PATCH', body });
        toast('All changes saved','success');
        loadCaregiverDetail(id);
      }catch(err){
        toast(err.message,'error');
        btn.disabled = false; btn.textContent = 'Save All Changes';
      }
    });

    // Copy upload link
    $('#btn-copy-upload-link').addEventListener('click',()=>{
      const url = window.location.origin + '/upload/' + caregiverId;
      navigator.clipboard.writeText(url).then(()=>toast('Upload link copied!','success')).catch(()=>toast('Could not copy','error'));
    });

    // Delete caregiver
    const deleteBtn = $('#btn-delete-caregiver');
    if(deleteBtn) deleteBtn.addEventListener('click',()=> openDeleteCaregiverModal(caregiverId, name));

    // Document upload
    $$('.btn-upload-doc').forEach(btn=>{
      btn.addEventListener('click',()=> openUploadModal(id, btn.dataset.type));
    });

    // Document preview
    $$('.btn-preview-doc').forEach(btn=>{
      btn.addEventListener('click',()=> openDocPreviewModal(caregiverId, btn.dataset.type, btn.dataset.filename));
    });

    $$('.btn-resolve-doc').forEach(btn=>{
      btn.addEventListener('click',()=> openResolveModal(id, btn.dataset.type, btn.dataset.entered, btn.dataset.extracted));
    });

  }catch(err){
    main.innerHTML = `<div class="empty-state"><div class="icon">&#9888;</div><p>Failed to load caregiver: ${err.message}</p></div>`;
  }
}

function renderDocCard(caregiverId, type, doc){
  // doc comes from getComplianceSummary: { label, status, enteredDate, aiExtractedDate, dateMismatch, filePath, ... }
  let statusBadge, dateInfo, actions;
  const status = doc ? doc.status : 'missing';

  if(status === 'missing'){
    statusBadge = '<span class="badge badge-missing">Missing</span>';
    dateInfo = '';
    actions = `<button class="btn btn-accent btn-sm btn-upload-doc" data-type="${type}">&#8593; Upload</button>`;
  } else {
    const isExpired = status === 'expired';
    statusBadge = isExpired
      ? '<span class="badge badge-expired">Expired</span>'
      : '<span class="badge badge-valid">Valid</span>';
    const enteredDate = doc.enteredDate;
    const aiDate = doc.aiExtractedDate;
    const mismatch = doc.dateMismatch;
    dateInfo = `<div class="doc-dates">
      ${enteredDate ? `<div>${doc.dateLabel || 'Date'}: <strong>${formatDate(enteredDate)}</strong></div>` : ''}
      ${aiDate ? `<div>AI Extracted: <strong>${formatDate(aiDate)}</strong>${mismatch ? '<span class="mismatch-warn">&#9888; Mismatch</span>':''}</div>` : ''}
    </div>`;
    const fileName = doc.fileName || '';
    actions = `
      <button class="btn btn-outline btn-sm btn-preview-doc" data-type="${type}" data-filename="${fileName}">&#128065; View File</button>
      <button class="btn btn-accent btn-sm btn-upload-doc" data-type="${type}">&#8593; Re-upload</button>
      ${mismatch ? `<button class="btn btn-warning btn-sm btn-resolve-doc" data-type="${type}" data-entered="${enteredDate||''}" data-extracted="${aiDate||''}">&#9998; Resolve</button>` : ''}`;
  }
  const docLabel = doc && doc.label ? doc.label : docTypeLabel(type);
  return `<div class="doc-card">
    <div class="doc-card-header"><h4>${docLabel}</h4>${statusBadge}</div>
    ${dateInfo}
    <div class="doc-actions">${actions}</div>
  </div>`;
}

function openUploadModal(caregiverId, docType){
  openModal(`
    <div class="modal-header">
      <h3>Upload: ${docTypeLabel(docType)}</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Document File</label>
        <div class="drop-zone" id="upload-drop-zone">
          <div>Drag &amp; drop file here or <strong>click to browse</strong></div>
          <input type="file" id="upload-file-input" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp" style="display:none">
          <div class="file-name" id="upload-file-name"></div>
        </div>
      </div>
      <div class="field">
        <label>Expiration Date</label>
        <input type="date" id="upload-date-input">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-submit-btn">Upload</button>
    </div>`);

  $('#modal-close-btn').addEventListener('click', closeModal);
  $('#modal-cancel-btn').addEventListener('click', closeModal);

  const dropZone = $('#upload-drop-zone');
  const fileInput = $('#upload-file-input');
  let selectedFile = null;

  dropZone.addEventListener('click',()=> fileInput.click());
  dropZone.addEventListener('dragover',(e)=>{ e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave',()=> dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop',(e)=>{
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if(e.dataTransfer.files.length){
      selectedFile = e.dataTransfer.files[0];
      $('#upload-file-name').textContent = selectedFile.name;
    }
  });
  fileInput.addEventListener('change',()=>{
    if(fileInput.files.length){
      selectedFile = fileInput.files[0];
      $('#upload-file-name').textContent = selectedFile.name;
    }
  });

  $('#modal-submit-btn').addEventListener('click', async ()=>{
    if(!selectedFile){ toast('Please select a file','warning'); return; }
    const btn = $('#modal-submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('uploaded_by','admin');
    const dateVal = $('#upload-date-input').value;
    if(dateVal) fd.append('entered_date', dateVal);
    try{
      await api(`/api/upload/${caregiverId}/${docType}`,{method:'POST',body:fd});
      toast('Document uploaded','success');
      closeModal();
      loadCaregiverDetail(caregiverId);
    }catch(err){
      toast(err.message,'error');
      btn.disabled = false;
      btn.textContent = 'Upload';
    }
  });
}

function openResolveModal(caregiverId, docType, enteredDate, extractedDate){
  openModal(`
    <div class="modal-header">
      <h3>Resolve Date Mismatch: ${docTypeLabel(docType)}</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:16px;font-size:.85rem;color:var(--muted)">The entered date and AI-extracted date differ. Choose which date to keep as the official expiration date.</p>
      <div class="field">
        <label>Select Date</label>
        <select id="resolve-choice">
          <option value="entered">Entered Date: ${formatDate(enteredDate)}</option>
          <option value="extracted">AI Extracted Date: ${formatDate(extractedDate)}</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-warning" id="modal-submit-btn">Resolve</button>
    </div>`);

  $('#modal-close-btn').addEventListener('click', closeModal);
  $('#modal-cancel-btn').addEventListener('click', closeModal);
  $('#modal-submit-btn').addEventListener('click', async ()=>{
    const choice = $('#resolve-choice').value;
    const btn = $('#modal-submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
    try{
      await api(`/api/caregivers/${caregiverId}/documents/${docType}/resolve`,{method:'POST',body:{accepted_date: choice}});
      toast('Date mismatch resolved','success');
      closeModal();
      loadCaregiverDetail(caregiverId);
    }catch(err){
      toast(err.message,'error');
      btn.disabled = false;
      btn.textContent = 'Resolve';
    }
  });
}

function openDocPreviewModal(caregiverId, docType, fileName){
  const fileUrl = `${API}/api/caregivers/${caregiverId}/documents/${docType}/file`;
  const ext = (fileName||'').split('.').pop().toLowerCase();
  const isImage = ['jpg','jpeg','png','gif','webp'].includes(ext);
  const isPdf = ext === 'pdf';

  let previewHtml;
  if(isImage){
    previewHtml = `<div class="preview-container"><img src="${fileUrl}" alt="${docTypeLabel(docType)}"></div>`;
  } else if(isPdf){
    previewHtml = `<div class="preview-container"><iframe src="${fileUrl}"></iframe></div>`;
  } else {
    previewHtml = `<div class="preview-container" style="padding:40px;color:var(--muted)">Preview not available for this file type.<br>Use the download link below.</div>`;
  }

  openModal(`
    <div class="modal-header">
      <h3>${docTypeLabel(docType)}</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body" style="padding:10px 20px">
      ${previewHtml}
    </div>
    <div class="modal-footer">
      <a href="${fileUrl}" target="_blank" download class="btn btn-outline btn-sm">&#8595; Download</a>
      <button class="btn btn-primary btn-sm" id="modal-cancel-btn">Close</button>
    </div>`);

  // Make modal wider for previews
  $('#modal-content').classList.add('modal-preview');
  $('#modal-close-btn').addEventListener('click', ()=>{ $('#modal-content').classList.remove('modal-preview'); closeModal(); });
  $('#modal-cancel-btn').addEventListener('click', ()=>{ $('#modal-content').classList.remove('modal-preview'); closeModal(); });
}

function openDeleteCaregiverModal(caregiverId, name){
  openModal(`
    <div class="modal-header" style="border-bottom-color:var(--danger)">
      <h3 style="color:var(--danger)">&#9888; Delete Caregiver</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:16px;font-size:.85rem">Are you sure you want to delete <strong>${name}</strong> (ID: ${caregiverId})? This will permanently remove their profile, all uploaded documents, and compliance records.</p>
      <div class="field">
        <label>Type the caregiver's full name to confirm</label>
        <input type="text" id="delete-confirm-input" placeholder="${name}" autocomplete="off">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-danger" id="modal-delete-btn" disabled>Delete Permanently</button>
    </div>`);

  $('#modal-close-btn').addEventListener('click', closeModal);
  $('#modal-cancel-btn').addEventListener('click', closeModal);

  const confirmInput = $('#delete-confirm-input');
  const deleteBtn = $('#modal-delete-btn');
  confirmInput.addEventListener('input',()=>{
    deleteBtn.disabled = confirmInput.value.trim().toLowerCase() !== name.toLowerCase();
  });

  deleteBtn.addEventListener('click', async ()=>{
    deleteBtn.disabled = true;
    deleteBtn.innerHTML = '<div class="spinner"></div>';
    try{
      await api(`/api/caregivers/${caregiverId}`,{method:'DELETE'});
      toast('Caregiver deleted','success');
      closeModal();
      navigate('caregivers');
    }catch(err){
      toast(err.message,'error');
      deleteBtn.disabled = false;
      deleteBtn.textContent = 'Delete Permanently';
    }
  });
}

// Settings page - Admin user management
async function loadSettings(){
  const main = $('#main-content');
  if(currentUser.role !== 'admin'){
    main.innerHTML = `<div class="empty-state"><div class="icon">&#128274;</div><p>Admin access required to view settings.</p></div>`;
    return;
  }
  try{
    const users = await api('/api/auth/users');
    const list = Array.isArray(users) ? users : [];
    main.innerHTML = `
      <h2 class="page-title">Settings</h2>
      <div class="section">
        <div class="section-title">&#128100; Admin Users
          <button class="btn btn-primary btn-sm" id="btn-add-user" style="margin-left:auto">+ Add User</button>
        </div>
        <div class="card">
          <div class="table-scroll">
            <table class="settings-table">
              <thead><tr>
                <th style="cursor:default">ID</th>
                <th style="cursor:default">Username</th>
                <th style="cursor:default">Name</th>
                <th style="cursor:default">Role</th>
                <th style="cursor:default">Created</th>
              </tr></thead>
              <tbody>${list.map(u=>`<tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.name}</td>
                <td><span class="badge badge-${u.role}">${u.role}</span></td>
                <td>${formatDate(u.created_at)}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
      </div>`;

    $('#btn-add-user').addEventListener('click', openAddUserModal);
  }catch(err){
    main.innerHTML = `<div class="empty-state"><div class="icon">&#9888;</div><p>Failed to load settings: ${err.message}</p></div>`;
  }
}

function openAddUserModal(){
  openModal(`
    <div class="modal-header">
      <h3>Add Admin User</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Username *</label>
        <input type="text" id="new-user-username" autocomplete="off">
      </div>
      <div class="field">
        <label>Password *</label>
        <input type="password" id="new-user-password" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="new-user-name" autocomplete="off">
      </div>
      <div class="field">
        <label>Role</label>
        <select id="new-user-role">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-submit-btn">Create User</button>
    </div>`);

  $('#modal-close-btn').addEventListener('click', closeModal);
  $('#modal-cancel-btn').addEventListener('click', closeModal);

  $('#modal-submit-btn').addEventListener('click', async ()=>{
    const username = $('#new-user-username').value.trim();
    const password = $('#new-user-password').value;
    const name = $('#new-user-name').value.trim();
    const role = $('#new-user-role').value;

    if(!username || !password || !name){
      toast('All fields are required','warning');
      return;
    }

    const btn = $('#modal-submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
    try{
      await api('/api/auth/users',{method:'POST',body:{username,password,name,role}});
      toast('User created successfully','success');
      closeModal();
      loadSettings();
    }catch(err){
      toast(err.message,'error');
      btn.disabled = false;
      btn.textContent = 'Create User';
    }
  });
}

async function init(){
  const authed = await checkAuth();
  if(!authed && getRoute() !== 'login'){
    window.location.hash = '#/login';
  }
  renderApp();
}

window.addEventListener('hashchange', ()=>{
  if(!currentUser && getRoute() !== 'login'){
    window.location.hash = '#/login';
    return;
  }
  renderApp();
});

init();

})();
</script>
